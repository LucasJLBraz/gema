<svg viewBox="0 0 760 400" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,Segoe UI,sans-serif">
<rect x="0" y="0" width="760" height="400" fill="#FFFFFF" rx="12"/>
<text x="380" y="20" text-anchor="middle" font-size="12" fill="#4A3F32">MAPE by prompt arm — 100-photo benchmark, lower is better</text>

<!-- gridlines -->
<line x1="260" y1="30" x2="260" y2="292" stroke="#E6DDD2" stroke-width="1"/>
<line x1="342" y1="30" x2="342" y2="292" stroke="#E6DDD2" stroke-width="1"/>
<line x1="424" y1="30" x2="424" y2="292" stroke="#E6DDD2" stroke-width="1"/>
<line x1="506" y1="30" x2="506" y2="292" stroke="#E6DDD2" stroke-width="1"/>
<line x1="588" y1="30" x2="588" y2="292" stroke="#E6DDD2" stroke-width="1"/>
<line x1="670" y1="30" x2="670" y2="292" stroke="#E6DDD2" stroke-width="1"/>

<!-- baseline reference -->
<line x1="585.9" y1="34" x2="585.9" y2="296" stroke="#4A3F32" stroke-width="1.5" stroke-dasharray="4,3" stroke-opacity="0.6"/>
<text x="585.9" y="27" text-anchor="middle" font-size="10" fill="#4A3F32">baseline 79.5%</text>

<!-- bars: no_cot 55.9% -->
<rect x="260" y="38" width="229.2" height="20" rx="4" ry="4" fill="#9A8E80"/>
<rect x="260" y="38" width="4" height="20" fill="#9A8E80"/>
<text x="252" y="52" text-anchor="end" font-size="12" fill="#4A3F32">no_cot</text>
<text x="497" y="52" font-size="12" fill="#4A3F32" style="font-variant-numeric:tabular-nums">55.9%</text>

<!-- with_scale 56.8% -->
<rect x="260" y="76" width="232.9" height="20" rx="4" ry="4" fill="#9A8E80"/>
<rect x="260" y="76" width="4" height="20" fill="#9A8E80"/>
<text x="252" y="90" text-anchor="end" font-size="12" fill="#4A3F32">with_scale</text>
<text x="500.9" y="90" font-size="12" fill="#4A3F32" style="font-variant-numeric:tabular-nums">56.8%</text>

<!-- no_cot_with_scale_reasoning 57.4% — SHIPPED -->
<rect x="260" y="114" width="235.3" height="20" rx="4" ry="4" fill="#B3700C"/>
<rect x="260" y="114" width="4" height="20" fill="#B3700C"/>
