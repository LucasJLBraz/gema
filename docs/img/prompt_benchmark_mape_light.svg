<!-- grounded 74.9% -->
<rect x="260" y="152" width="307.1" height="20" rx="4" ry="4" fill="#9A8E80"/>
<rect x="260" y="152" width="4" height="20" fill="#9A8E80"/>
<text x="252" y="166" text-anchor="end" font-size="12" fill="#4A3F32">grounded</text>
<text x="575.1" y="166" font-size="12" fill="#4A3F32" style="font-variant-numeric:tabular-nums">74.9%</text>

<!-- combined 76.9% -->
<rect x="260" y="190" width="315.3" height="20" rx="4" ry="4" fill="#9A8E80"/>
<rect x="260" y="190" width="4" height="20" fill="#9A8E80"/>
<text x="252" y="204" text-anchor="end" font-size="12" fill="#4A3F32">combined</text>
<text x="583.3" y="204" font-size="12" fill="#4A3F32" style="font-variant-numeric:tabular-nums">76.9%</text>

<!-- baseline 79.5% -->
<rect x="260" y="228" width="325.9" height="20" rx="4" ry="4" fill="#9A8E80"/>
<rect x="260" y="228" width="4" height="20" fill="#9A8E80"/>
<text x="252" y="242" text-anchor="end" font-size="12" font-weight="600" fill="#1A1814">baseline</text>
<text x="593.9" y="242" font-size="12" font-weight="600" fill="#1A1814" style="font-variant-numeric:tabular-nums">79.5%</text>

<!-- no_cot_with_scale 95.7% -->
<rect x="260" y="266" width="392.4" height="20" rx="4" ry="4" fill="#9A8E80"/>
<rect x="260" y="266" width="4" height="20" fill="#9A8E80"/>
<text x="252" y="280" text-anchor="end" font-size="12" fill="#4A3F32">no_cot_with_scale</text>
<text x="660.4" y="280" font-size="12" fill="#4A3F32" style="font-variant-numeric:tabular-nums">95.7%</text>

<!-- axis -->
<line x1="260" y1="34" x2="260" y2="296" stroke="#BEB0A0" stroke-width="1"/>
<line x1="260" y1="296" x2="670" y2="296" stroke="#BEB0A0" stroke-width="1"/>
<text x="260" y="310" text-anchor="middle" font-size="11" fill="#4A3F32">0</text>
<text x="342" y="310" text-anchor="middle" font-size="11" fill="#4A3F32">20</text>
<text x="424" y="310" text-anchor="middle" font-size="11" fill="#4A3F32">40</text>
<text x="506" y="310" text-anchor="middle" font-size="11" fill="#4A3F32">60</text>
<text x="588" y="310" text-anchor="middle" font-size="11" fill="#4A3F32">80</text>
<text x="670" y="310" text-anchor="middle" font-size="11" fill="#4A3F32">100</text>
<text x="465" y="326" text-anchor="middle" font-size="12" fill="#4A3F32">MAPE (%)</text>

<!-- legend -->
<rect x="20" y="337" width="18" height="10" rx="2" fill="#B3700C"/>
<text x="44" y="346" font-size="12" fill="#4A3F32">shipped — no_cot_with_scale_reasoning</text>
<rect x="20" y="355" width="18" height="10" rx="2" fill="#9A8E80"/>
<text x="44" y="364" font-size="12" fill="#4A3F32">other tested prompt arms</text>
<line x1="20" y1="378" x2="38" y2="378" stroke="#4A3F32" stroke-width="1.5" stroke-dasharray="4,3" stroke-opacity="0.6"/>
<text x="44" y="382" font-size="12" fill="#4A3F32">baseline reference (79.5% MAPE)</text>
</svg>
