name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build release APK and publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        # NOTE: release build is currently signed with the debug keystore
        # (see android/app/build.gradle.kts) so it installs directly without
        # a dedicated signing key. Not Play Store-ready.
        run: flutter build apk --release

      - name: Rename artifact
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk "dist/gema-${GITHUB_SHA::7}.apk"

      - name: Publish "latest" release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: Latest build (${{ github.sha }})
          body: |
            Automatically built from `main` @ ${{ github.sha }}.

            This is a **debug-signed** release build — not Play Store-ready — meant
            for sideloading during early development. See [CHANGELOG via commit log](https://github.com/${{ github.repository }}/commits/main).
          prerelease: true
          make_latest: true
          files: dist/gema-*.apk
